<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pattern 11</title>
</head>
<body>
    <div id="root"></div>
    <script>
        let output = "";
        for(let i=5;i>=1;i--){
            for(j=1;j<=i;j++){
                output += String.fromCharCode(64 + j);
            }

            output += "\n";
        }

        document.getElementById("root").innerText = output;
    </script>
</body>
</html>

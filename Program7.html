<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pattern 7</title>
</head>
<body>
    <div id="root"></div>
    <script>
        let output = "";

        for(let i=1;i<=5;i++){
            for(j=1;j<=i;j++){
                if(j % 2 === 0){
                    output += "#";
                }else{
                    output += "*";
                }
            }

            output += "\n";
        }

        document.getElementById("root").innerText = output;
    </script>
</body>
</html>

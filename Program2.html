<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pattern2</title>
</head>
<body>
    <div id="root"></div>
    <script>
        let output = "";
        for(let i=5;i>=1;i--){
            for(let j=i;j>=1;j--){
                output += "*";
            }

            output += "\n";
        }

        document.getElementById("root").innerText = output;
    </script>
</body>
</html>
